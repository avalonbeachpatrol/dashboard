<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a1428;
    color: #ffffff;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    background: #0a1020;
    border-bottom: 2px solid #ffffff;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 56px; height: 56px; object-fit: contain; }
  .header-title h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 2px; text-transform: uppercase; line-height: 1.1; }
  .header-title p { font-size: 11px; color: #c8a84b; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }
  .header-center { text-align: center; }
  .clock { font-size: 42px; font-weight: 800; color: #ffffff; letter-spacing: 3px; line-height: 1; }
  .date-display { font-size: 12px; color: #c8a84b; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-top: 2px; }
  .header-right { text-align: right; }
  .refresh-badge { font-size: 10px; color: #ffffff; opacity: 0.35; letter-spacing: 1px; margin-top: 4px; }
  .main {
    display: grid;
    grid-template-columns: 1.05fr 2.95fr;
    grid-template-rows: auto auto;
    gap: 8px;
    padding: 8px;
    height: calc(100vh - 72px);
  }
  .left-col { grid-column: 1; grid-row: 1 / 3; display: flex; flex-direction: column; gap: 8px; }
  .center-col { grid-column: 2; grid-row: 1 / 3; display: flex; flex-direction: column; gap: 8px; }
  .right-col { display: none; }
  .card { background: #111e3a; border: 1px solid #1e3060; border-radius: 10px; padding: 12px 14px; overflow: hidden; flex-shrink: 0; }
  .weather-card { flex: 0 0 auto; min-height: 0; }
  .conditions-card { flex: 0 0 auto; }
  .rip-card { flex: 0 0 auto; padding: 8px 12px; }
  .rip-card .card-title { margin-bottom: 6px; font-size: 13px; }
  .rip-card .rip-badge { font-size: 10px; padding: 3px 9px; margin-bottom: 5px; }
  .rip-card .rip-bar-bg { height: 8px; margin-bottom: 5px; }
  .rip-card .rip-detail, .rip-card .nws-src { font-size: 9px; line-height: 1.35; margin-top: 3px !important; }
  .rip-card #rip-content > div[style] { font-size: 10px !important; line-height: 1.35 !important; margin-bottom: 4px !important; }
  .cam-card { display:none; }
  .tide-card { flex: 0 0 auto; min-height:0; display:flex; flex-direction:column; }
  .tide-chart-wrap { width:100%; flex:1; min-height:180px; background:#071226; border:1px solid #1e3060; border-radius:8px; padding:8px; }
  #tideChartCanvas { width:100%; height:100%; display:block; }
  .tide-summary { display:grid; grid-template-columns:1fr; gap:6px; align-items:stretch; }
  .tide-box { background:#0a1428; border:1px solid #1e3060; border-radius:7px; padding:7px 8px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; min-height:60px; }
  .tide-main-line { display:flex; align-items:baseline; justify-content:center; gap:8px; margin:5px 0 3px; flex-wrap:nowrap; }
  .tide-box-label { font-size:8px; font-weight:800; letter-spacing:1.3px; text-transform:uppercase; opacity:0.75; line-height:1.2; }
  .tide-time-large { font-size:24px; font-weight:900; line-height:1; color:#ffffff; white-space:nowrap; }
  .tide-height-large { font-size:24px; font-weight:900; line-height:1; color:#ffffff; white-space:nowrap; opacity:0.95; }
  .tide-height-small { font-size:10px; font-weight:700; opacity:0.72; }
  .tide-meta { display:flex; justify-content:center; font-size: 20px; opacity: 0.98; margin-bottom:8px; text-align:center; }
  .tide-meta a { text-decoration:none; }
  .wx-main { gap: 14px; margin-bottom: 14px; }
  .wx-temp { font-size: 56px; }
  .wx-desc { font-size: 15px; opacity: 0.85; }
  .wx-feels { font-size: 13px; opacity: 0.75; }
  .weather-card .cond-value { font-size: 22px !important; }
  body, body * { color: #ffffff !important; }
  a { color: #ffffff !important; border-color: rgba(255,255,255,0.45) !important; }
  .badge-low, .badge-moderate, .badge-high { color: #ffffff !important; border: 1px solid rgba(255,255,255,0.35); }

  .card.grow { flex: 1; min-height: 0; }
  .card-title { font-size: 14px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: #c8a84b; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
  .cam-wrap { width: 100%; flex: 1; border-radius: 6px; overflow: hidden; background: #000; min-height: 0; }
  .cam-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .radar-wrap { width: 100%; flex: 1; border-radius: 6px; overflow: hidden; background: #060e1c; border: 1px solid #1e3060; min-height: 0; position: relative; }
  .radar-wrap img, .radar-wrap iframe { width: 100%; height: 100%; object-fit: cover; object-position: 52% 68%; display: block; border:0; }
  .cond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cond-item { background: #0a1428; border-radius: 6px; padding: 8px 10px; }
  .cond-label { font-size: 9px; color: #ffffff; opacity: 0.55; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .cond-value { font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1; }
  .cond-unit { font-size: 11px; opacity: 0.6; font-weight: 400; }
  .cond-sub { font-size: 10px; color: #ffffff; opacity: 0.5; margin-top: 2px; }
  .wx-main { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .wx-temp { font-size: 40px; font-weight: 800; color: #fff; line-height: 1; }
  .wx-desc { font-size: 12px; color: #ffffff; opacity: 0.6; }
  .wx-feels { font-size: 11px; color: #ffffff; opacity: 0.5; margin-top: 2px; }
  .rip-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
  .badge-low { background: #0d3d1f; color: #4ade80; }
  .badge-moderate { background: #3d2d00; color: #fbbf24; }
  .badge-high { background: #3d0f0f; color: #f87171; }
  .rip-bar-bg { width: 100%; height: 14px; background: #0a1428; border-radius: 7px; overflow: hidden; margin-bottom: 8px; }
  .rip-bar-fill { height: 100%; border-radius: 7px; }
  .rip-detail { font-size: 11px; color: #ffffff; opacity: 0.65; line-height: 1.8; }
  .rip-detail span { color: #fff; opacity: 1; font-weight: 700; }
  .nws-src { font-size: 9px; color: #ffffff; opacity: 0.3; margin-top: 6px; letter-spacing: 0.5px; }
  .surf-link { display: inline-block; margin-top: 6px; font-size: 10px; color: #c8a84b; text-decoration: none; border: 1px solid #c8a84b44; padding: 2px 8px; border-radius: 4px; }
  .loading-text { color: #fff; opacity: 0.4; font-size: 12px; font-style: italic; }
  .error-text { color: #f87171; font-size: 12px; }
  .refresh-info { font-size: 10px; color: #ffffff; opacity: 0.25; text-align: right; padding: 4px 12px 8px; letter-spacing: 1px; }
  .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .tide-summary { grid-template-columns: 1fr 1fr 1fr 1fr !important; }
  .tide-box { min-height: 58px; padding: 6px 5px; }
  .tide-time-large { font-size: 25px; }
  .tide-height-large { font-size: 25px; font-weight: 900; line-height: 1; color:#ffffff; white-space:nowrap; }
  .tide-trend-large { font-size: 18px; font-weight: 900; line-height: 1.25; text-align:center; opacity: 0.95; margin-top: 8px; }
  .tide-meta { justify-content:center; font-size: 18px; opacity: 0.95; }


  .tide-summary { grid-template-columns: 1fr !important; }
  .tide-pair { display:grid; grid-template-columns: 1fr 1fr; gap:6px; }
  .tide-trend-banner { background:#111e3a; border:1px solid #1e3060; border-radius:10px; padding:10px 14px; font-size:24px; font-weight:900; text-align:center; letter-spacing:0.5px; text-transform:uppercase; }
  .radar-card { flex: 1.35; min-height: 430px; display:flex; flex-direction:column; }
  .center-tide-graph-card { flex: 0 0 230px; display:flex; flex-direction:column; }
  .center-tide-graph-card .card-title { font-size:14px !important; }
  .card-title { font-size:14px !important; }
  .tide-card .card-title, .weather-card .card-title, .conditions-card .card-title { font-size:14px !important; }


  /* Left information panel: white cards with navy text for TV readability */

  /* Tides: keep @ layout, height boxes to the right, arrows on the left */
  .left-col .tide-pair {
    grid-template-columns: 52px minmax(0, 1fr) 102px !important;
    align-items: stretch;
    gap: 7px;

  .tide-arrow-box {

  .tide-arrow-waves { display:none !important; }

  .left-col .tide-arrow-box.high *, .left-col .tide-arrow-box.low * { color: inherit !important; }
  .left-col .tide-box.high-tide-time-box,
  .left-col .tide-box.low-tide-time-box {
    padding: 7px 8px !important;
    min-height:58px;
  }
  .left-col .tide-time-box-label {
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .5px;
    text-transform: uppercase;
    line-height: 1.05;
    color:#ffffff !important;

  }
  .left-col .tide-time-large {
    font-size: 21px !important;

  }
  .left-col .tide-height-box.high-height-box {

  .left-col .tide-height-box.low-height-box {

  }
  .left-col .tide-height-box *,
  .left-col .tide-height-box .tide-box-label,
  .left-col .tide-height-box .tide-height-large {

<script>
const AVALON_LAT = 39.1015, AVALON_LON = -74.7204;

const NDBC_ACYN4_REALTIME_URL = "https://www.ndbc.noaa.gov/data/realtime2/ACYN4.txt";
const NDBC_ACYN4_LATEST_URL = "https://www.ndbc.noaa.gov/data/latest_obs/ACYN4.txt";
const NDBC_ACYN4_RSS_URL = "https://www.ndbc.noaa.gov/data/latest_obs/ACYN4.rss";
const CORS = "https://api.allorigins.win/raw?url=";

function fetchWithTimeout(url, options = {}, timeoutMs = 7000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(timer));
}

function setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = p(h)+':'+p(m)+':'+p(s)+' '+ap;
  document.getElementById('date-display').textContent = days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
}
setInterval(updateClock, 1000); updateClock();

function windDir(deg) {
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];
}

async function fetchNWS() {
  const cacheKey = 'abpRipRiskNJZ024DailyCacheV4';
  const now = new Date();
  const todayKey = now.toLocaleDateString('en-CA');
  const afterEight = now.getHours() >= 8;

  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && cached.data && (cached.date === todayKey || !afterEight)) return cached.data;
  } catch(e) {}

  async function getForecastText() {
    const urls = [
      NWS_URL,
      'https://forecast.weather.gov/product.php?site=phi&issuedby=PHI&product=SRF',
      'https://forecast.weather.gov/product.php?issuedby=PHI&product=SRF&site=phi'
    ];

    const attempts = [];
    urls.forEach(u => {
      const busted = u + (u.includes('?') ? '&' : '?') + '_=' + Date.now();
      attempts.push({ url: busted, type: 'text' });
      attempts.push({ url: CORS + encodeURIComponent(busted), type: 'text' });
      attempts.push({ url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(busted), type: 'allorigins-json' });
      attempts.push({ url: 'https://corsproxy.io/?' + encodeURIComponent(busted), type: 'text' });
      attempts.push({ url: 'https://r.jina.ai/http://' + busted.replace(/^https?:\/\//,''), type: 'text' });
    });

    for (const item of attempts) {
      try {
        const res = await fetchWithTimeout(item.url, { cache: 'no-store' }, 7000);
        if (!res.ok) continue;
        let txt = await res.text();
        if (item.type === 'allorigins-json') {
          try {
            const parsed = JSON.parse(txt);
            txt = parsed && parsed.contents ? String(parsed.contents) : '';
          } catch(e) { txt = ''; }
        }
        if (!txt || !txt.trim()) continue;
        txt = txt
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/p>|<\/div>|<\/pre>|<\/td>|<\/tr>/gi, '\n')
          .replace(/<[^>]+>/g, '')
          .replace(/&nbsp;/g, ' ')
          .replace(/&amp;/g, '&')
          .replace(/&lt;/g, '<')
          .replace(/&gt;/g, '>')
          .replace(/\r/g, '');

        if (/NJZ024-\d{6}-/i.test(txt) && /Rip Current Risk/i.test(txt)) return txt;
      } catch(e) {}
    }
    return '';
  }

  function extractPeriod(section, label) {
    const re = new RegExp('\\.' + label + '\\.([\\s\\S]*?)(?=\\n\\.[A-Z ]+\\.\\s*\\n|\\n&&|\\n\\$\\$|$)', 'i');
    const m = section.match(re);
    return m ? m[1] : '';
  }

  function parseRisk(block) {
    const m = block.match(/Rip Current Risk\.*\s*(Low|Moderate|High)\./i);
    return m ? m[1].trim() : null;
  }

  function parseSurf(block) {
    const m = block.match(/Surf Height\.*\s*([^\n.]+(?:feet|foot))/i);
    return m ? m[1].replace(/ feet| foot/gi,'').trim() : null;
  }

  function parseWater(block) {
    const m = block.match(/Water Temperature\.*\s*([^\n.]+)/i);
    return m ? m[1].trim() : null;
  }

  try {
    const text = await getForecastText();
    if (!text) throw new Error('NWS SRF text unavailable');

    const zoneMatch = text.match(/NJZ024-\d{6}-[\s\S]*?(?=\n(?:NJZ|DEZ)\d{3}-\d{6}-|\n\$\$|$)/i);
    if (!zoneMatch) throw new Error('NJZ024 section not found');

    const section = zoneMatch[0];
    const dayName = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();

    const todayBlock =
      extractPeriod(section, 'TODAY') ||
      extractPeriod(section, dayName) ||
      section;

    const tomorrowBlock =
      extractPeriod(section, 'TUESDAY') ||
      extractPeriod(section, 'WEDNESDAY') ||
      extractPeriod(section, 'TOMORROW') ||
      '';

    const data = {
      ripRisk: parseRisk(todayBlock) || 'Unknown',
      surfHeight: parseSurf(todayBlock),
      waterTemp: parseWater(todayBlock),
      ripTomorrow: parseRisk(tomorrowBlock),
      surfTomorrow: parseSurf(tomorrowBlock)
    };

    if (data.ripRisk !== 'Unknown') {
      localStorage.setItem(cacheKey, JSON.stringify({ date: todayKey, data }));
    }

    return data;
  } catch(e) {
    try {
      const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
      if (cached && cached.data) return cached.data;
    } catch(err) {}
    return { ripRisk: 'Unknown' };
  }
}

function renderRip(nws) {
  const risk = (nws.ripRisk||'Unknown').toLowerCase();
  let badgeClass='badge-low', barColor='#4ade80', barWidth=20;
  if (risk==='high') { badgeClass='badge-high'; barColor='#f87171'; barWidth=90; }
  else if (risk==='moderate') { badgeClass='badge-moderate'; barColor='#fbbf24'; barWidth=55; }
  document.getElementById('rip-content').innerHTML =
    '<div><span class="rip-badge '+badgeClass+'">'+(nws.ripRisk||'UNKNOWN').toUpperCase()+' RISK</span></div>'+
    '<div class="rip-bar-bg"><div class="rip-bar-fill" style="width:'+barWidth+'%;background:'+barColor+';"></div></div>';
}

async function fetchACYN4WaterTemp() {
  async function getText(url) {
    const cacheBusted = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
    const urls = [
      { url: cacheBusted, mode: 'text' },
      { url: CORS + encodeURIComponent(cacheBusted), mode: 'text' },
      { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(cacheBusted), mode: 'allorigins-json' },
      { url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(cacheBusted), mode: 'text' },
      { url: 'https://corsproxy.io/?' + encodeURIComponent(cacheBusted), mode: 'text' },
      { url: 'https://r.jina.ai/http://r.jina.ai/http://' + cacheBusted.replace(/^https?:\/\//,''), mode: 'text' }
    ];
    for (const item of urls) {
      try {
        const res = await fetchWithTimeout(item.url, { cache: 'no-store' }, 6500);
        if (!res.ok) continue;
        const txt = await res.text();
        if (!txt || !txt.trim()) continue;
        if (item.mode === 'allorigins-json') {
          try {
            const parsed = JSON.parse(txt);
            if (parsed && parsed.contents && String(parsed.contents).trim().length > 0) {
              return String(parsed.contents);
            }
          } catch(e) {}
        } else {
          return txt;
        }
      } catch (err) {}
    }
    return '';
  }

  function cToF(c) { return (c * 9 / 5) + 32; }
  function validC(c) { return Number.isFinite(c) && c > -5 && c < 40; }
  function validF(f) { return Number.isFinite(f) && f > 20 && f < 100; }

  function parseRealtimeText(text) {
    if (!text) return null;
    const lines = text.trim().split(/\r?\n/).filter(Boolean);
    const headerLine = lines.find(line => /^#\s*YY|^#\s*yr/i.test(line));
    const dataLine = lines.find(line => line.trim() && !line.trim().startsWith('#'));
    if (!headerLine || !dataLine) return null;
    const headers = headerLine.replace(/^#/, '').trim().split(/\s+/).map(h => h.toUpperCase());
    const values = dataLine.trim().split(/\s+/);
    const wtmpIndex = headers.indexOf('WTMP');
    if (wtmpIndex < 0 || !values[wtmpIndex] || values[wtmpIndex] === 'MM') return null;
    const c = parseFloat(values[wtmpIndex]);
    return validC(c) ? cToF(c) : null;
  }

  function parseLatestOrRss(text) {
    if (!text) return null;
    const decoded = text
      .replace(/&deg;/gi, '°')
      .replace(/&nbsp;/gi, ' ')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<[^>]+>/g, ' ')
      .replace(/\s+/g, ' ');

    const patternsF = [
      /Water\s+Temperature\s*(?:\(WTMP\))?\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?F/i,
      /Water\s+Temp\s*(?:\(WTMP\))?\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?F/i,
      /WTMP\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?F/i
    ];
    for (const pattern of patternsF) {
      const match = decoded.match(pattern);
      if (match) {
        const f = parseFloat(match[1]);
        if (validF(f)) return f;
      }
    }

    const patternsC = [
      /Water\s+Temperature\s*(?:\(WTMP\))?\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?C/i,
      /Water\s+Temp\s*(?:\(WTMP\))?\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?C/i,
      /WTMP\s*[:=]?\s*([\d.]+)\s*(?:°|deg\s*)?C/i
    ];
    for (const pattern of patternsC) {
      const match = decoded.match(pattern);
      if (match) {
        const c = parseFloat(match[1]);
        if (validC(c)) return cToF(c);
      }
    }
    return null;
  }

  try {
    // ACYN4 is the required source. Try the raw NDBC realtime feed first,
    // then the NDBC latest observation text/RSS/station page through CORS-safe fallbacks.
    const urls = [
      NDBC_ACYN4_REALTIME_URL,
      NDBC_ACYN4_LATEST_URL,
      NDBC_ACYN4_RSS_URL,
      NDBC_ACYN4_URL
    ];

    for (const baseUrl of urls) {
      const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + '_=' + Date.now();
      const text = await getText(url);
      // Always try the table parser first because NDBC text feeds are column based.
      // Then try the station/RSS wording parser.
      const value = parseRealtimeText(text) || parseLatestOrRss(text);
      if (value !== null && value !== undefined) {
        try { localStorage.setItem('abpACYN4WaterTempF', JSON.stringify({ value, time: Date.now() })); } catch(e) {}
        return value;
      }
    }
    try {
      const cached = JSON.parse(localStorage.getItem('abpACYN4WaterTempF') || 'null');
      if (cached && validF(Number(cached.value))) return Number(cached.value);
    } catch(e) {}
    return null;
  } catch(e) {
    return null;
  }
}


const SURFLINE_AVALON_SPOT_ID = '584204214e65fad6a7709c84'; // Surfline Avalon Jetty / Avalon NJ
const SURFLINE_AVALON_URL = 'https://www.surfline.com/surf-report/avalon-jetty/'+SURFLINE_AVALON_SPOT_ID+'?view=table';
const SURFLINE_WAVE_URL = 'https://services.surfline.com/kbyg/spots/forecasts/wave?spotId='+SURFLINE_AVALON_SPOT_ID+'&days=1&intervalHours=1&cacheEnabled=false&units%5BwaveHeight%5D=FT&units%5BswellHeight%5D=FT&units%5BtideHeight%5D=FT';
const SURFLINE_OVERVIEW_URL = 'https://services.surfline.com/kbyg/spots/forecasts?spotId='+SURFLINE_AVALON_SPOT_ID+'&days=1&intervalHours=1&cacheEnabled=false&units%5BwaveHeight%5D=FT&units%5BswellHeight%5D=FT&units%5BtideHeight%5D=FT';
const SURFLINE_CONDITIONS_URL = 'https://services.surfline.com/kbyg/spots/forecasts/conditions?spotId='+SURFLINE_AVALON_SPOT_ID+'&days=1&intervalHours=1&cacheEnabled=false&units%5BwaveHeight%5D=FT&units%5BswellHeight%5D=FT';
const SURFLINE_REPORT_URL = 'https://services.surfline.com/kbyg/spots/reports?spotId='+SURFLINE_AVALON_SPOT_ID+'&cacheEnabled=false&units%5BwaveHeight%5D=FT&units%5BswellHeight%5D=FT';
function bustCache(url) {
  return url + (url.includes('?') ? '&' : '?') + '_abp=' + Date.now();
}

function cleanSurfHeightValue(value) {
  if (value === null || value === undefined || value === '') return null;
  let text = String(value).trim();
  text = text.replace(/&ndash;|–|—/g, '-').replace(/\s+/g, ' ');
  text = text.replace(/\s*(feet|foot|ft\.?)/ig, '').trim();
  text = text.replace(/^(around|about)\s+/i, '');
  const plus = /\+$/.test(text) ? '+' : '';
  text = text.replace(/\+$/,'').trim();
  const range = text.match(/^(\d+(?:\.\d+)?)\s*(?:-|to)\s*(\d+(?:\.\d+)?)$/i);
  if (range) {
    const a = Math.max(0, Math.round(Number(range[1])));
    const b = Math.max(0, Math.round(Number(range[2])));
    if (a || b) return (a === b ? String(a) : a + '-' + b) + plus;
  }
  const single = text.match(/^(\d+(?:\.\d+)?)$/);
  if (single) return String(Math.max(0, Math.round(Number(single[1])))) + plus;
  const human = text.match(/(\d+)\s*(?:-|to)\s*(\d+)\s*(?:ft|feet)?\+?/i);
  if (human) return cleanSurfHeightValue(human[0]);
  return text;
}

function readSurfObject(obj, depth = 0) {
  if (!obj || typeof obj !== 'object' || depth > 4) return null;

  const directKeys = ['surf', 'surfHeight', 'waveHeight', 'height', 'humanRelation', 'display'];
  for (const key of directKeys) {
    const value = obj[key];
    if (typeof value === 'string' || typeof value === 'number') {
      const cleaned = cleanSurfHeightValue(value);
      if (cleaned) return cleaned;
    }
    if (value && typeof value === 'object') {
      const min = value.min ?? value.minimum ?? value.minHeight ?? value.low;
      const max = value.max ?? value.maximum ?? value.maxHeight ?? value.high;
      if (Number.isFinite(Number(min)) && Number.isFinite(Number(max))) {
        return cleanSurfHeightValue(min + '-' + max);
      }
      if (value.humanRelation) return cleanSurfHeightValue(value.humanRelation);
      if (value.display) return cleanSurfHeightValue(value.display);
    }
  }

  // Surfline sometimes nests the visible current report under data.surf or data.conditions[0].surf.
  for (const key of ['data', 'report', 'condition', 'conditions', 'forecast', 'surf']) {
    const value = obj[key];
    if (Array.isArray(value)) {
      for (const item of value.slice(0, 3)) {
        const found = readSurfObject(item, depth + 1);
        if (found) return found;
      }
    } else if (value && typeof value === 'object') {
      const found = readSurfObject(value, depth + 1);
      if (found) return found;
    }
  }
  return null;
}

async function fetchSurflineSurfHeight() {
  // Use Surfline's current Avalon Jetty report/conditions first. Do not use offshore swell height.
  // Cache-busting is intentional because this dashboard may run all day on a TV.
  const primaryUrls = [
    SURFLINE_REPORT_URL,
    SURFLINE_CONDITIONS_URL,
    SURFLINE_OVERVIEW_URL,
    SURFLINE_WAVE_URL
  ];
  const urls = [];
  for (const base of primaryUrls) {
    const fresh = bustCache(base);
    urls.push(fresh);
    urls.push(CORS + encodeURIComponent(fresh));
    urls.push('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(fresh));
    urls.push('https://corsproxy.io/?' + encodeURIComponent(fresh));
  }

  for (const url of urls) {
    try {
      const res = await fetchWithTimeout(url, { cache: 'no-store' }, 8000);
      if (!res.ok) continue;
      const data = await res.json();
      const containers = [
        data && data.data && data.data.surf,
        data && data.data && data.data.report && data.data.report.surf,
        data && data.data && data.data.conditions && data.data.conditions[0],
        data && data.associated && data.associated.forecastLocation,
        data && data.data && data.data.forecast && data.data.forecast[0],
        data && data.data && data.data.wave && data.data.wave[0],
        data && data.data,
        data
      ];
      for (const item of containers) {
        const value = readSurfObject(item);
        if (value) return value;
      }
    } catch(e) {}
  }

  // Page fallback: pull the visible Surf Height value from the Surfline page if JSON is blocked.
  const pageUrls = [
    bustCache(SURFLINE_AVALON_URL),
    CORS + encodeURIComponent(bustCache(SURFLINE_AVALON_URL)),
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(bustCache(SURFLINE_AVALON_URL)),
    'https://corsproxy.io/?' + encodeURIComponent(bustCache(SURFLINE_AVALON_URL))
  ];
  for (const url of pageUrls) {
    try {
      const res = await fetchWithTimeout(url, { cache: 'no-store' }, 8000);
      if (!res.ok) continue;
      const html = await res.text();
      const patterns = [
        /Surf\s*Height[\s\S]{0,500}?(\d+(?:\.\d+)?\s*(?:-|to|–)\s*\d+(?:\.\d+)?\+?|\d+(?:\.\d+)?\+?)\s*(?:FT|ft|feet)/i,
        /surfHeight[^0-9]{0,300}(\d+(?:\.\d+)?\s*(?:-|to|–)\s*\d+(?:\.\d+)?\+?|\d+(?:\.\d+)?\+?)\s*(?:ft|feet)/i,
        /"surf"\s*:\s*\{[^}]*"min"\s*:\s*(\d+(?:\.\d+)?)[^}]*"max"\s*:\s*(\d+(?:\.\d+)?)/i
      ];
      for (const pattern of patterns) {
        const m = html.match(pattern);
        if (m) return m[2] ? cleanSurfHeightValue(m[1] + '-' + m[2]) : cleanSurfHeightValue(m[1]);
      }
    } catch(e) {}
  }
  return null;
}


function normalizeSurflineDirection(value) {
  if (value === null || value === undefined || value === '') return null;
  if (typeof value === 'string') {
    const t = value.trim().toUpperCase();
    if (/^(N|NNE|NE|ENE|E|ESE|SE|SSE|S|SSW|SW|WSW|W|WNW|NW|NNW)$/.test(t)) return t;
    const n = parseFloat(t);
    if (Number.isFinite(n)) return windDir(n);
    return t.length <= 4 ? t : null;
  }
  const n = Number(value);
  return Number.isFinite(n) ? windDir(n) : null;
}

function readSurflineSwellDetails(obj, depth = 0) {
  if (!obj || typeof obj !== 'object' || depth > 7) return null;

  // Surfline's wave forecast usually exposes an hourly object with a swells array.
  const swellArrays = [];
  for (const key of ['swells', 'swell', 'components']) {
    if (Array.isArray(obj[key])) swellArrays.push(obj[key]);
  }
  for (const arr of swellArrays) {
    const valid = arr.map(s => {
      if (!s || typeof s !== 'object') return null;
      const period = Number(s.period ?? s.swellPeriod ?? s.dominantPeriod ?? s.wavePeriod ?? s.seconds);
      const dirRaw = s.direction ?? s.directionMean ?? s.swellDirection ?? s.angle ?? s.degrees;
      const direction = normalizeSurflineDirection(dirRaw);
      const height = Number(s.height ?? s.swellHeight ?? s.max ?? s.impact ?? 0);
      if (Number.isFinite(period) && period > 0 && direction) return { period, direction, height: Number.isFinite(height) ? height : 0 };
      return null;
    }).filter(Boolean);
    if (valid.length) {
      valid.sort((a,b) => (b.height || 0) - (a.height || 0));
      return { period: valid[0].period, direction: valid[0].direction };
    }
  }

  // Some endpoints place the main swell values directly on the object.
  const directPeriod = Number(obj.period ?? obj.swellPeriod ?? obj.dominantPeriod ?? obj.wavePeriod ?? obj.seconds);
  const directDirection = normalizeSurflineDirection(obj.direction ?? obj.directionMean ?? obj.swellDirection ?? obj.angle ?? obj.degrees);
  if (Number.isFinite(directPeriod) && directPeriod > 0 && directDirection) return { period: directPeriod, direction: directDirection };

  for (const key of Object.keys(obj)) {
    const value = obj[key];
    if (Array.isArray(value)) {
      // Prefer the current or first few hourly forecast objects, not far-future values.
      for (const item of value.slice(0, 6)) {
        const found = readSurflineSwellDetails(item, depth + 1);
        if (found) return found;
      }
    } else if (value && typeof value === 'object') {
      const found = readSurflineSwellDetails(value, depth + 1);
      if (found) return found;
    }
  }
  return null;
}

async function fetchSurflineSwellDetails() {
  const primaryUrls = [SURFLINE_WAVE_URL, SURFLINE_REPORT_URL, SURFLINE_OVERVIEW_URL, SURFLINE_CONDITIONS_URL];
  const urls = [];
  for (const base of primaryUrls) {
    const fresh = bustCache(base);
    urls.push(fresh);
    urls.push(CORS + encodeURIComponent(fresh));
    urls.push('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(fresh));
    urls.push('https://corsproxy.io/?' + encodeURIComponent(fresh));
  }
  for (const url of urls) {
    try {
      const res = await fetchWithTimeout(url, { cache: 'no-store' }, 8000);
      if (!res.ok) continue;
      const data = await res.json();
      const details = readSurflineSwellDetails(data);
      if (details) return details;
    } catch(e) {}
  }
  return null;
}

async function fetchConditions(nws) {
  try {
    const [acyn4S, surflineS, surflineDetailsS] = await Promise.allSettled([
      fetchACYN4WaterTemp(),
      fetchSurflineSurfHeight(),
      fetchSurflineSwellDetails()
    ]);
    const acyn4Temp = acyn4S.status === 'fulfilled' ? acyn4S.value : null;
    const surflineHeight = surflineS.status === 'fulfilled' ? surflineS.value : null;
    const surflineDetails = surflineDetailsS.status === 'fulfilled' ? surflineDetailsS.value : null;
    const nwsSurfHeight = nws && nws.surfHeight ? cleanSurfHeightValue(nws.surfHeight) : null;
    // Do not use offshore/model wave height as the displayed surf height. It caused false 9+ ft readings.
    // Show only Surfline's local Avalon Jetty surf-height range so stale NWS beach text does not overwrite current Surfline conditions.
    const displaySurfHeight = surflineHeight;
    const waveH = displaySurfHeight ? (String(displaySurfHeight).toLowerCase().includes('ft') ? displaySurfHeight : displaySurfHeight+' ft') : '&mdash;';
    const waveHNum = parseFloat(waveH);
    const waveHColor = waveHNum>4?'#f87171':waveHNum>2?'#fbbf24':'#60a5fa';
    const waterTemp = acyn4Temp || null;
    const waterTempDisplay = Number.isFinite(Number(waterTemp)) ? Number(waterTemp).toFixed(2) : null;
    const wtColor = waterTemp ? (waterTemp>70?'#4ade80':waterTemp>60?'#fbbf24':'#60a5fa') : '#fff';
    const period = surflineDetails && Number.isFinite(Number(surflineDetails.period)) ? Math.round(Number(surflineDetails.period)) : null;
    const swellDir = surflineDetails && surflineDetails.direction ? surflineDetails.direction : null;
    document.getElementById('conditions-content').innerHTML =
      '<div class="cond-grid">'+
      '<div class="cond-item"><div class="cond-label">Surf Height</div><div class="cond-value" style="color:'+waveHColor+';font-size:20px;">'+waveH+'</div></div>'+
      '<div class="cond-item"><div class="cond-label">Water Temp</div><div class="cond-value" style="color:'+wtColor+';">'+(waterTempDisplay||'&mdash;')+(waterTempDisplay?'<span class="cond-unit">&deg;F</span>':'')+'</div></div>'+
      '<div class="cond-item"><div class="cond-label">Wave Period</div><div class="cond-value">'+(period||'&mdash;')+(period?'<span class="cond-unit"> sec</span>':'')+'</div></div>'+
      '<div class="cond-item"><div class="cond-label">Swell Dir</div><div class="cond-value" style="font-size:18px;">'+(swellDir||'&mdash;')+'</div></div>'+
      '</div>';
  } catch(e) {
    document.getElementById('conditions-content').innerHTML = '<div class="error-text">Conditions unavailable</div>';
  }
}

let tideDataCache = null;

function drawTideChart(predictions, now) {
  const canvas = document.getElementById('tideChartCanvas');
  if (!canvas) return;
  const container = canvas.parentElement;
  const cw = container.clientWidth || 600;
  canvas.width = cw; canvas.height = Math.max(170, container.clientHeight || 190);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const nowMs = now.getTime();
  const upcomingHL = predictions.map(p => ({...p, ms:new Date(p.t.replace(' ','T')).getTime()})).filter(p => p.ms >= nowMs);
  const firstHigh = upcomingHL.find(p => p.type === 'H');
  const firstLow = upcomingHL.find(p => p.type === 'L');
  const lastNeeded = Math.max(firstHigh ? firstHigh.ms : nowMs, firstLow ? firstLow.ms : nowMs);
  const windowStart = Math.max(predictions.length ? new Date(predictions[0].t.replace(' ','T')).getTime() : nowMs, nowMs - 3*3600000);
  const windowEnd = Math.min((predictions.length ? new Date(predictions[predictions.length-1].t.replace(' ','T')).getTime() : nowMs + 18*3600000), lastNeeded + 3*3600000);
  const todayMidnight = new Date(now); todayMidnight.setHours(0,0,0,0);
  const pts = [];
  for (let i = 0; i < predictions.length-1; i++) {
    const a = predictions[i], b = predictions[i+1];
    const ta = new Date(a.t.replace(' ','T')).getTime();
    const tb = new Date(b.t.replace(' ','T')).getTime();
    const va = parseFloat(a.v), vb = parseFloat(b.v);
    for (let s = 0; s <= 20; s++) {
      const f = s/20;
      const t = ta+(tb-ta)*f;
      if (t>=windowStart && t<=windowEnd) pts.push({t, v: va+(vb-va)*(1-Math.cos(f*Math.PI))/2});
    }
  }
  if (pts.length < 2) return;
  const PADL=36,PADR=10,PADT=24,PADB=22;
  const plotW=W-PADL-PADR, plotH=H-PADT-PADB;
  const minV=0, maxV=Math.max(...pts.map(p=>p.v))*1.12;
  const tx = t => PADL+((t-windowStart)/(windowEnd-windowStart))*plotW;
  const ty = v => PADT+plotH-((v-minV)/(maxV-minV))*plotH;
  const sunrise = new Date(todayMidnight); sunrise.setHours(5,38,0);
  const sunset = new Date(todayMidnight); sunset.setHours(20,6,0);
  const sunrise2 = new Date(todayMidnight); sunrise2.setHours(29,38,0);
  function shadeNight(from, to) {
    const x1=Math.max(tx(from),PADL), x2=Math.min(tx(to),PADL+plotW);
    if(x2<=x1) return;
    ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(x1,PADT,x2-x1,plotH);
  }
  shadeNight(windowStart, sunrise.getTime());
  shadeNight(sunset.getTime(), sunrise2.getTime());
  ctx.font='10px sans-serif'; ctx.textAlign='right';
  for (let ft=0; ft<=Math.ceil(maxV); ft++) {
    const y=ty(ft);
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(PADL,y); ctx.lineTo(W-PADR,y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillText(ft,PADL-4,y+3);
  }
  ctx.textAlign='center'; ctx.font='9px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)';
  for (let t=windowStart; t<=windowEnd; t+=2*3600000) {
    const x=tx(t), label=new Date(t).getHours()%24;
    ctx.fillText(label,x,H-4);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(x,PADT); ctx.lineTo(x,H-PADB); ctx.stroke();
  }

  const todayPts=pts.filter(p=>p.t<windowStart+24*3600000);
  const tomorrowPts=pts.filter(p=>p.t>=windowStart+24*3600000);
  function fillArea(pArr,color) {
    if(pArr.length<2) return;
    ctx.beginPath(); ctx.moveTo(tx(pArr[0].t),H-PADB);
    pArr.forEach(p=>ctx.lineTo(tx(p.t),ty(p.v)));
    ctx.lineTo(tx(pArr[pArr.length-1].t),H-PADB); ctx.closePath();
    ctx.fillStyle=color; ctx.fill();
  }
  function strokeLine(pArr,color,lw) {
    if(pArr.length<2) return;
    ctx.beginPath(); pArr.forEach((p,i)=>i===0?ctx.moveTo(tx(p.t),ty(p.v)):ctx.lineTo(tx(p.t),ty(p.v)));
    ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.stroke();
  }
  fillArea(todayPts,'rgba(60,100,180,0.55)');
  fillArea(tomorrowPts,'rgba(50,80,150,0.38)');
  strokeLine(todayPts,'rgba(100,150,230,0.9)',2);
  strokeLine(tomorrowPts,'rgba(80,120,200,0.6)',1.5);
  const labelExtremes = [];
  if (firstHigh) labelExtremes.push(firstHigh);
  if (firstLow) labelExtremes.push(firstLow);
  labelExtremes.forEach(p => {
    const t=new Date(p.t.replace(' ','T')).getTime();
    if(t<windowStart||t>windowEnd) return;
    const x=tx(t), y=ty(parseFloat(p.v));
    const isHigh=p.type==='H', col=isHigh?'#60a5fa':'#f87171';
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='#0a1428'; ctx.lineWidth=1.5; ctx.stroke();
    const d=new Date(p.t.replace(' ','T'));
    const hh=d.getHours()%12||12, mm=String(d.getMinutes()).padStart(2,'0'), ap2=d.getHours()>=12?'PM':'AM';
    ctx.font='bold 10px sans-serif'; ctx.fillStyle=col; ctx.textAlign='center';
    ctx.fillText(hh+':'+mm+' '+ap2, x, isHigh?y-9:y+16);
  });
  const nt=now.getTime();
  if(nt>=windowStart && nt<=windowEnd) {
    const nx=tx(nt);
    ctx.strokeStyle='#c8a84b'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(nx,PADT); ctx.lineTo(nx,H-PADB); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#c8a84b'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText('NOW',Math.min(nx,W-PADR-16),PADT-6);
  }
  drawMoonPhaseInTideChart(ctx, W, H);
  ctx.font='10px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='left';
  ctx.fillText('(ft)',0,PADT-6);
}


function getMoonPhaseInfo(date) {
  // Simple astronomical approximation based on known new moon: 2000-01-06 18:14 UTC.
  const synodicMonth = 29.530588853;
  const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14, 0);
  const days = (date.getTime() - knownNewMoon) / 86400000;
  let age = days % synodicMonth;
  if (age < 0) age += synodicMonth;
  const phase = age / synodicMonth;
  let name, emoji;
  if (phase < 0.03 || phase >= 0.97) { name = 'New Moon'; emoji = '🌑'; }
  else if (phase < 0.22) { name = 'Waxing Crescent'; emoji = '🌒'; }
  else if (phase < 0.28) { name = 'First Quarter'; emoji = '🌓'; }
  else if (phase < 0.47) { name = 'Waxing Gibbous'; emoji = '🌔'; }
  else if (phase < 0.53) { name = 'Full Moon'; emoji = '🌕'; }
  else if (phase < 0.72) { name = 'Waning Gibbous'; emoji = '🌖'; }
  else if (phase < 0.78) { name = 'Last Quarter'; emoji = '🌗'; }
  else { name = 'Waning Crescent'; emoji = '🌘'; }
  return { phase, name, emoji };
}

function drawMoonPhaseInTideChart(ctx, W, H) {
  const info = getMoonPhaseInfo(new Date());
  const x = W - 92;
  const y = 50;
  const r = 29;

  ctx.save();
  ctx.globalAlpha = 1;

  // dark outer shadow
  ctx.beginPath();
  ctx.arc(x, y, r + 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fill();

  // moon clipping circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();

  // inverted gray lunar surface: illuminated portion intentionally darker
  const grad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.2, x, y, r);
  grad.addColorStop(0, '#9ca3af');
  grad.addColorStop(0.45, '#6b7280');
  grad.addColorStop(1, '#374151');
  ctx.fillStyle = grad;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);

  // subtle craters
  const craters = [
    [-9, -8, 4, .18], [7, -10, 3, .14], [10, 6, 5, .16],
    [-12, 10, 3, .15], [-2, 5, 2.5, .12], [3, 15, 2.2, .12],
    [14, -2, 2, .11], [-1, -15, 2.5, .10]
  ];
  craters.forEach(([dx, dy, cr, a]) => {
    ctx.beginPath();
    ctx.arc(x + dx, y + dy, cr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(30,41,59,' + (a * 0.85) + ')';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + dx - cr * 0.25, y + dy - cr * 0.25, cr * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(203,213,225,' + (a * 0.45) + ')';
    ctx.fill();
  });

  // inverted phase overlay. The normally shadowed portion is lighter; the normally lit portion is darker.
  const phase = info.phase;
  if (phase < 0.03 || phase >= 0.97) {
    ctx.fillStyle = 'rgba(226,232,240,.88)';
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
  } else if (phase > 0.47 && phase < 0.53) {
    // full moon: no shadow
  } else {
    const waxing = phase < 0.5;
    const distFromFull = Math.abs(phase - 0.5) / 0.5; // 1=new, 0=full
    const offset = distFromFull * r * 2;
    ctx.beginPath();
    // Correct Northern Hemisphere orientation:
    // Waxing phases are illuminated on the RIGHT; waning phases are illuminated on the LEFT.
    ctx.arc(x + (waxing ? offset : -offset), y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(226,232,240,.82)';
    ctx.fill();
    if (phase > 0.22 && phase < 0.78) {
      // quarter/gibbous cleanup to keep the terminator smoother
      const cutX = x + (waxing ? r * 0.02 : -r * 0.02);
      ctx.beginPath();
      ctx.rect(waxing ? cutX : x - r, y - r, r, r * 2);
      ctx.fillStyle = 'rgba(226,232,240,' + (distFromFull * 0.35) + ')';
      ctx.fill();
    }
  }

  ctx.restore();

  // moon rim
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // phase text inside tide graph
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = 'bold 11px Inter, Segoe UI, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(info.name.toUpperCase(), x, y + r + 7);
  ctx.restore();
}

function updateMoonPhase() {
  // Moon phase is now drawn directly inside the tide graph canvas.
  if (tideDataCache) drawTideChart(tideDataCache, new Date());
}

async function fetchTides() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const startDate = new Date(now);
  startDate.setDate(startDate.getDate()-1);
  const endDate = new Date(now);
  endDate.setDate(endDate.getDate()+2);
  const fmt = d => d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  const url = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date='+fmt(startDate)+'&end_date='+fmt(endDate)+'&station='+NOAA_STATION+'&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=avalon_beach_patrol_dashboard&format=json';

  function fmtTime(date) {
    const h = date.getHours()%12 || 12;
    const m = String(date.getMinutes()).padStart(2,'0');
    const ap = date.getHours() >= 12 ? 'PM' : 'AM';
    return h+':'+m+' '+ap;
  }

  function countdown(date) {
    const mins = Math.max(0, Math.round((date.getTime()-now.getTime())/60000));
    const h = Math.floor(mins/60);
    const m = mins%60;
    if (h <= 0) return 'in '+m+' min';
    return 'in '+h+'h '+String(m).padStart(2,'0')+'m';
  }

  try {
    const res = await fetchWithTimeout(url, {}, 7000);
    const data = await res.json();
    if (!data.predictions) throw new Error('no tide predictions');

    const parsed = data.predictions.map(p => ({
      ...p,
      date: new Date(p.t.replace(' ','T')),
      height: parseFloat(p.v)
    }));
    tideDataCache = data.predictions;
    drawTideChart(data.predictions, now);
    updateMoonPhase();

    const upcoming = parsed.filter(p => p.date >= now);
    const nextHigh = upcoming.find(p => p.type === 'H');
    const nextLow = upcoming.find(p => p.type === 'L');
    const past = parsed.filter(p => p.date < now);
    const last = past[past.length-1];
    const next = upcoming[0];
    const trend = next ? (next.type === 'H' ? 'Rising toward high tide' : 'Falling toward low tide') : 'Trend unavailable';

    function tidePair(label, tide) {
      const isHigh = /high/i.test(label);
      const tideClass = isHigh ? 'high-tide-time-box' : 'low-tide-time-box';
      const heightClass = isHigh ? 'high-height-box' : 'low-height-box';
      const arrowClass = isHigh ? 'high' : 'low';
      const arrow = isHigh ? '&#9650;' : '&#9660;';
      const shortLabel = isHigh ? 'HIGH TIDE @' : 'LOW TIDE @';
      if (!tide) {
        return '<div class="tide-pair">'+
          '<div class="tide-arrow-box '+arrowClass+'"><div class="tide-arrow-icon">'+arrow+'</div></div>'+
          '<div class="tide-box '+tideClass+'"><div class="tide-time-box-label">'+shortLabel+'</div><div class="tide-time-large">--</div></div>'+
          '<div class="tide-box tide-height-box '+heightClass+'"><div class="tide-box-label">Height</div><div class="tide-height-large">--</div></div>'+
        '</div>';
      }
      return '<div class="tide-pair">'+
        '<div class="tide-arrow-box '+arrowClass+'"><div class="tide-arrow-icon">'+arrow+'</div></div>'+
        '<div class="tide-box '+tideClass+'"><div class="tide-time-box-label">'+shortLabel+'</div><div class="tide-time-large">'+fmtTime(tide.date)+'</div><div class="tide-height-small">'+countdown(tide.date)+'</div></div>'+
        '<div class="tide-box tide-height-box '+heightClass+'"><div class="tide-box-label">Height</div><div class="tide-height-large">'+tide.height.toFixed(2)+' ft</div></div>'+
      '</div>';
    }

    document.getElementById('tide-events').innerHTML = tidePair('High Tide', nextHigh) + tidePair('Low Tide', nextLow);

    const trendTarget = next ? fmtTime(next.date) : '--';
    const trendText = next ? ((next.type === 'H' ? 'Rising Toward High Tide @ ' : 'Falling Toward Low Tide @ ') + trendTarget) : 'Tide trend unavailable';
    document.getElementById('tide-meta').innerHTML = '<span class="tide-trend-large">'+trendText+'</span>';
    const bannerEl=document.getElementById('tide-trend-banner'); if(bannerEl) bannerEl.textContent=trendText;
  } catch(e) {
    document.getElementById('tide-events').innerHTML =
      '<div class="tide-box"><div class="error-text">Tide data unavailable</div></div><div class="tide-box"><div class="error-text">Townsend Inlet NOAA</div></div>';
    document.getElementById('tide-meta').innerHTML = '<span class="tide-trend-large">Tide data unavailable</span>';
    const bannerEl=document.getElementById('tide-trend-banner'); if(bannerEl) bannerEl.textContent='Tide data unavailable';
  }
}

function valOrDash(v, digits) {
  if (v === null || v === undefined || Number.isNaN(Number(v))) return '&mdash;';
  return digits === undefined ? Math.round(Number(v)) : Number(v).toFixed(digits);
}

async function fetchWeather() {
  function renderWeather(temp, windSpeed, windGust, windDeg, precipRate, precipTotal) {
    const windDirection = windDeg !== null && windDeg !== undefined ? windDir(windDeg) : '&mdash;';
    document.getElementById('weather-content').innerHTML =
      '<div class="wx-main">'+
        '<div><div class="wx-temp">'+valOrDash(temp,1)+'&deg;F</div></div>'+
      '</div>'+
      '<div class="weather-grid">'+
        '<div class="cond-item"><div class="cond-label">Wind &amp; Gust</div><div class="cond-value" style="font-size:17px;">'+valOrDash(windSpeed,1)+' / '+valOrDash(windGust,1)+'<span class="cond-unit"> mph</span></div></div>'+
        '<div class="cond-item"><div class="cond-label">Wind Direction</div><div class="cond-value" style="font-size:34px;font-weight:900;">'+windDirection+'</div></div>'+
        '<div class="cond-item"><div class="cond-label">Precip Rate</div><div class="cond-value" style="font-size:17px;">'+valOrDash(precipRate,2)+'<span class="cond-unit"> in/hr</span></div></div>'+
        '<div class="cond-item"><div class="cond-label">Precip Accum</div><div class="cond-value" style="font-size:17px;">'+valOrDash(precipTotal,2)+'<span class="cond-unit"> in</span></div></div>'+
      '</div>';
  }

  async function fetchJsonAny(url) {
    const busted = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
    const attempts = [
      { url: busted, type: 'json' },
      { url: CORS + encodeURIComponent(busted), type: 'json' },
      { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(busted), type: 'allorigins-json' },
      { url: 'https://corsproxy.io/?' + encodeURIComponent(busted), type: 'json' },
      { url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(busted), type: 'json' }
    ];

    for (const item of attempts) {
      try {
        const res = await fetchWithTimeout(item.url, { cache: 'no-store' }, 8000);
        if (!res.ok) continue;
        const txt = await res.text();
        if (!txt || !txt.trim()) continue;
        if (item.type === 'allorigins-json') {
          const wrapped = JSON.parse(txt);
          return JSON.parse(wrapped.contents);
        }
        return JSON.parse(txt);
      } catch(e) {}
    }
    throw new Error('All weather fetch attempts failed');
  }

  try {
    const d = await fetchJsonAny(WU_OBS_URL);
    const obs = d && d.observations && d.observations[0];
    if (!obs || !obs.imperial) throw new Error('No Weather Underground observation returned');
    const i = obs.imperial;
    renderWeather(i.temp, i.windSpeed, i.windGust, obs.winddir, i.precipRate, i.precipTotal);
    return;
  } catch(e) {}

  try {
    const fallbackUrl = 'https://api.open-meteo.com/v1/forecast?latitude='+AVALON_LAT+'&longitude='+AVALON_LON+'&current=temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation&daily=precipitation_sum&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FNew_York';
    const d = await fetchJsonAny(fallbackUrl);
    const c = d.current || {};
    const todayPrecip = d.daily && d.daily.precipitation_sum ? d.daily.precipitation_sum[0] : null;
    renderWeather(c.temperature_2m, c.wind_speed_10m, c.wind_gusts_10m, c.wind_direction_10m, c.precipitation, todayPrecip);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="error-text">Weather data unavailable</div>';
  }
}

function refreshRadar() {
  // Weather Underground radar is embedded directly in the iframe.
}

async function loadAll() {
  let nws = { ripRisk: 'Unknown' };
  try { nws = await fetchNWS(); } catch(e) {}
  try { renderRip(nws); } catch(e) { setHTML('rip-content','<div class="error-text">Rip current data unavailable</div>'); }
  updateMoonPhase();
  await Promise.allSettled([fetchTides(), fetchWeather(), fetchConditions(nws)]);
  try { refreshRadar(); } catch(e) {}
  const t = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setText('last-updated', 'Last updated '+t+' · Auto-refreshes every 60 sec');
}

loadAll().catch(() => {
  setHTML('rip-content','<div class="error-text">Rip current data unavailable</div>');
  setHTML('conditions-content','<div class="error-text">Conditions unavailable</div>');
  setHTML('weather-content','<div class="error-text">Weather unavailable</div>');
  const bannerEl2=document.getElementById('tide-trend-banner'); if(bannerEl2) bannerEl2.textContent='Tide data unavailable';
});
setInterval(loadAll, 60*1000);
window.addEventListener('resize', () => { if(tideDataCache) drawTideChart(tideDataCache, new Date()); });
</script>

<script id="abp-windy-responsive-script">
function resizeWindyRadarIframe() {
  const frame = document.getElementById('radar-frame');
  const wrap = frame ? frame.closest('.radar-wrap') : null;
  if (!frame || !wrap || !frame.src) return;

  const rect = wrap.getBoundingClientRect();
  const w = Math.max(320, Math.round(rect.width || window.innerWidth || 320));
  const h = Math.max(320, Math.round(rect.height || w));

  try {
    const url = new URL(frame.src);
    url.searchParams.set('width', String(w));
    url.searchParams.set('height', String(h));

    // On phones, zoom out slightly so Avalon and surrounding radar fit in the box.
    if (window.innerWidth <= 768) {
      url.searchParams.set('zoom', '8');
    } else {
      url.searchParams.set('zoom', '9');
    }

    const nextSrc = url.toString();
    if (frame.src !== nextSrc) frame.src = nextSrc;
  } catch(e) {}
}

window.addEventListener('load', resizeWindyRadarIframe);
window.addEventListener('resize', () => {
  clearTimeout(window.__abpWindyResizeTimer);
  window.__abpWindyResizeTimer = setTimeout(resizeWindyRadarIframe, 250);
});
window.addEventListener('orientationchange', () => {
  setTimeout(resizeWindyRadarIframe, 500);
});
</script>
